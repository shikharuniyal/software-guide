server {
    listen 80;

    # static page
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # forward /api/* to the api service (no CORS needed)
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_buffering off;                 # let streamed answers flow through
        proxy_read_timeout 600s;
    }
}
